name: 🦇 Build APK

# Bu workflow'u tetiklemenin yolları:
# 1. main/master branşına push at — otomatik build
# 2. GitHub'da Actions sekmesinden manuel çalıştır (workflow_dispatch)
# 3. Tag oluştur (v1.0.0 gibi) — release olarak APK eklenir

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1. Kodu çek
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # 2. Java 17 kur (Flutter için gerekli)
      - name: ☕ Java 17 kurulumu
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Flutter SDK kur (en son stable - withValues API'si için 3.27+ gerek)
      - name: 🦋 Flutter SDK kurulumu
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 4. Flutter durumunu kontrol et
      - name: 🩺 Flutter doctor
        run: flutter doctor -v

      # 5. Eksik platform dosyalarını tamamla (mevcut özelleştirmeleri KORU)
      # Önce kritik özel dosyaları yedekle → flutter create çalıştır → geri yükle
      # Bu yöntem hangi Flutter sürümünde olursa olsun güvenli çalışır
      - name: 🏗️ Eksik platform dosyalarını doldur
        run: |
          # Özel dosyaları yedekle
          mkdir -p /tmp/backup/android/app/src/main
          cp -r android/app/src/main/AndroidManifest.xml /tmp/backup/android/app/src/main/ 2>/dev/null || true
          cp android/app/build.gradle.kts /tmp/backup/android/app/ 2>/dev/null || true
          cp android/build.gradle.kts /tmp/backup/android/ 2>/dev/null || true
          cp android/settings.gradle.kts /tmp/backup/android/ 2>/dev/null || true

          # Flutter create — eksik wrapper jar, gradlew, drawable vs. eklensin
          # Verbose çalıştır ki hata varsa görelim
          flutter create -v --platforms=android --project-name=vampir_koylu --org=com.vampirkoylu --overwrite . || true

          # Özel dosyaları geri yükle (overwrite olmuş olabilir)
          cp -r /tmp/backup/android/app/src/main/AndroidManifest.xml android/app/src/main/ 2>/dev/null || true
          cp /tmp/backup/android/app/build.gradle.kts android/app/ 2>/dev/null || true
          cp /tmp/backup/android/build.gradle.kts android/ 2>/dev/null || true
          cp /tmp/backup/android/settings.gradle.kts android/ 2>/dev/null || true

          echo "==== Android klasor durumu ===="
          ls -la android/
          ls -la android/app/ || true
          ls -la android/gradle/wrapper/ || true

      # 6. Bağımlılıkları indir
      - name: 📦 Bağımlılıklar
        run: flutter pub get

      # 7. App ikonlarını tüm Android boyutlarına üret
      - name: 🎨 Launcher ikonlarını üret
        run: dart run flutter_launcher_icons

      # 8. Analiz (kod kalite kontrolü) — hatalar build'i durdurmasın
      - name: 🔍 Analiz
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      # 9. APK build (release, split-per-abi ile küçük APK'lar)
      - name: 🔨 APK build (release)
        run: flutter build apk --release --split-per-abi

      # 9. APK'ları artifact olarak yükle (her zaman erişilebilir)
      - name: 📤 APK'ları yükle
        uses: actions/upload-artifact@v4
        with:
          name: vampir-koylu-apks
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      # 10. Tag varsa Release oluştur ve APK'ları ekle
      - name: 🎁 Release oluştur (tag varsa)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/*.apk
          generate_release_notes: true
          body: |
            ## 🦇 Vampir Köylü ${{ github.ref_name }}

            APK dosyalarını aşağıdan indirebilirsin:
            - `app-arm64-v8a-release.apk` → Modern telefonlar (önerilen)
            - `app-armeabi-v7a-release.apk` → Eski telefonlar
            - `app-x86_64-release.apk` → Emülatör

            Telefona yükleme: APK'yi indir, "Bilinmeyen kaynaklardan yükleme" izni ver, dosyayı aç.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
