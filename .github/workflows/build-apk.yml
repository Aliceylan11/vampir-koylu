name: Build APK

# Tetikleyiciler:
# - main/master push -> otomatik build
# - Manuel (workflow_dispatch)
# - Tag (v*) -> Release olarak APK eklenir

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Flutter 3.27.x stable (pinned) - withValues() ve WidgetState API'leri icin
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.27.1'
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      # Eksik wrapper dosyalarini (gradle-wrapper.jar, gradlew) doldur.
      # --overwrite yok -> committed dosyalarimiz korunur.
      # Sadece eksik olanlar yaratilir.
      - name: Fill missing platform files (wrapper jar etc.)
        run: |
          flutter create --platforms=android --project-name=vampir_koylu --org=com.vampirkoylu .

          # flutter create yan etkilerini temizle:
          # 1) Yanlis package path'te (vampir_koylu vs app) MainActivity yaratmis olabilir
          rm -rf android/app/src/main/kotlin/com/vampirkoylu/vampir_koylu 2>/dev/null || true
          # 2) Default mipmap ikonlari -> flutter_launcher_icons bizimkileri uretecek
          rm -rf android/app/src/main/res/mipmap-hdpi
          rm -rf android/app/src/main/res/mipmap-mdpi
          rm -rf android/app/src/main/res/mipmap-xhdpi
          rm -rf android/app/src/main/res/mipmap-xxhdpi
          rm -rf android/app/src/main/res/mipmap-xxxhdpi

          echo "==== android/ icerigi ===="
          ls -la android/
          echo "==== gradle-wrapper.jar var mi? ===="
          ls -la android/gradle/wrapper/ || true
          echo "==== settings.gradle.kts (AGP versiyonu) ===="
          head -25 android/settings.gradle.kts
          echo "==== app/build.gradle.kts (namespace) ===="
          head -15 android/app/build.gradle.kts

      - name: Get dependencies
        run: flutter pub get

      # APP IKONLARI — assets/icon/icon.png + icon_fg.png'den uretir
      # continue-on-error: ikon hatasi build'i durdurmasin (default ikonla devam)
      - name: Generate launcher icons
        continue-on-error: true
        run: |
          ls -la assets/icon/ || echo "assets/icon yok!"
          dart run flutter_launcher_icons

      # Eger flutter_launcher_icons basarisiz olduysa AAPT2 patlar.
      # assets/icon/icon.png'i fallback olarak tum mipmap klasorlerine kopyala.
      - name: Ensure launcher icons exist (fallback)
        run: |
          SRC="assets/icon/icon.png"
          for d in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            mkdir -p android/app/src/main/res/$d
            if [ ! -f android/app/src/main/res/$d/ic_launcher.png ]; then
              cp "$SRC" android/app/src/main/res/$d/ic_launcher.png
            fi
          done
          echo "==== Mipmap icerigi ===="
          ls -la android/app/src/main/res/mipmap-*/ic_launcher.png

      - name: Analyze (non-blocking)
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Build APK (release, split-per-abi)
        id: apk_build
        run: |
          set -o pipefail
          flutter build apk --release --split-per-abi --verbose 2>&1 | tee build.log

      # Build hatasi olsa bile log'u her zaman yukle
      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: |
            build.log
            pubspec.yaml
            android/settings.gradle.kts
            android/build.gradle.kts
            android/app/build.gradle.kts
            android/gradle.properties
            android/gradle/wrapper/gradle-wrapper.properties
          retention-days: 7

      - name: Upload APKs
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vampir-koylu-apks
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/*.apk
          generate_release_notes: true
          body: |
            ## Vampir Koylu ${{ github.ref_name }}

            APK dosyalari:
            - `app-arm64-v8a-release.apk` -> Modern telefonlar (onerilen)
            - `app-armeabi-v7a-release.apk` -> Eski telefonlar
            - `app-x86_64-release.apk` -> Emulator

            Yukleme: APK'yi indir, "Bilinmeyen kaynaklardan yukleme"yi ac, dosyayi calistir.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
