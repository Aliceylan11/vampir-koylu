name: 🦇 Build APK

# Bu workflow'u tetiklemenin yolları:
# 1. main/master branşına push at — otomatik build
# 2. GitHub'da Actions sekmesinden manuel çalıştır (workflow_dispatch)
# 3. Tag oluştur (v1.0.0 gibi) — release olarak APK eklenir

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1. Kodu çek
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # 2. Java 17 kur (Flutter için gerekli)
      - name: ☕ Java 17 kurulumu
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Flutter SDK kur (en son stable - withValues API'si için 3.27+ gerek)
      - name: 🦋 Flutter SDK kurulumu
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 4. Flutter durumunu kontrol et
      - name: 🩺 Flutter doctor
        run: flutter doctor -v

      # 5. Eksik platform dosyalarını tamamla — Flutter MODERN template kullanılır
      # --overwrite YOK: lib/, pubspec.yaml ve özel android/ dosyalarımız ASLA ezilmez
      # Root android/ dosyalarını (settings.gradle.kts vs.) git'ten sildik;
      # Flutter create modern AGP 8.11+/Kotlin 2.2+ versiyonlarını koyar.
      - name: 🏗️ Eksik platform dosyalarını doldur
        run: |
          # Ekstra güvenlik — kritik özel dosyaları yedekle
          mkdir -p /tmp/backup
          cp pubspec.yaml /tmp/backup/pubspec.yaml
          cp android/app/build.gradle.kts /tmp/backup/app_build.gradle.kts
          cp android/app/src/main/AndroidManifest.xml /tmp/backup/AndroidManifest.xml
          cp android/app/src/main/kotlin/com/vampirkoylu/app/MainActivity.kt /tmp/backup/MainActivity.kt
          cp android/app/src/main/res/values/styles.xml /tmp/backup/styles.xml 2>/dev/null || true
          cp android/app/src/main/res/values-night/styles.xml /tmp/backup/styles-night.xml 2>/dev/null || true
          cp android/app/src/main/res/drawable/launch_background.xml /tmp/backup/launch_background.xml 2>/dev/null || true

          # Flutter create — eksik dosyaları (root gradle config, wrapper jar vs.) ekler
          # --overwrite YOK → mevcut özel dosyalarımız korunur
          flutter create --platforms=android --project-name=vampir_koylu --org=com.vampirkoylu .

          # Garanti olsun — özel dosyaları geri yükle
          cp /tmp/backup/pubspec.yaml pubspec.yaml
          cp /tmp/backup/app_build.gradle.kts android/app/build.gradle.kts
          cp /tmp/backup/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          cp /tmp/backup/MainActivity.kt android/app/src/main/kotlin/com/vampirkoylu/app/MainActivity.kt
          cp /tmp/backup/styles.xml android/app/src/main/res/values/styles.xml 2>/dev/null || true
          cp /tmp/backup/styles-night.xml android/app/src/main/res/values-night/styles.xml 2>/dev/null || true
          cp /tmp/backup/launch_background.xml android/app/src/main/res/drawable/launch_background.xml 2>/dev/null || true

          # Flutter create yanlış path'te MainActivity oluşturmuş olabilir (vampir_koylu vs app)
          rm -rf android/app/src/main/kotlin/com/vampirkoylu/vampir_koylu 2>/dev/null || true

          echo "==== ANDROID ROOT (Flutter create modern versiyonlari) ===="
          ls android/
          echo "==== settings.gradle.kts (AGP versiyonu) ===="
          head -30 android/settings.gradle.kts 2>/dev/null || head -30 android/settings.gradle
          echo "==== lib/main.dart ilk 15 satir (bizim kodun korundugunu dogrula) ===="
          head -15 lib/main.dart

      # 5b. Flutter create varsayilan launcher ikonlarini silelim — bizimkilerle cakismasin
      - name: 🧹 Varsayilan ikonlari temizle
        run: |
          rm -rf android/app/src/main/res/mipmap-hdpi || true
          rm -rf android/app/src/main/res/mipmap-mdpi || true
          rm -rf android/app/src/main/res/mipmap-xhdpi || true
          rm -rf android/app/src/main/res/mipmap-xxhdpi || true
          rm -rf android/app/src/main/res/mipmap-xxxhdpi || true

      # 6. Bağımlılıkları indir
      - name: 📦 Bağımlılıklar
        run: flutter pub get

      # 7. App ikonlarını tüm Android boyutlarına üret
      # continue-on-error: ikon hatası APK build'i durdurmasın (default ikonla devam)
      - name: 🎨 Launcher ikonlarını üret
        continue-on-error: true
        run: |
          echo "==== assets/icon icerigi ===="
          ls -la assets/icon/ || echo "assets/icon klasoru yok!"
          echo "==== flutter_launcher_icons calistir ===="
          dart run flutter_launcher_icons

      # 8. Analiz (kod kalite kontrolü) — hatalar build'i durdurmasın
      - name: 🔍 Analiz
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      # 9. APK build (release, split-per-abi ile küçük APK'lar)
      # Verbose çıktı + tee ile log dosyasına da yaz
      - name: 🔨 APK build (release)
        id: apk_build
        run: |
          set -o pipefail
          flutter build apk --release --split-per-abi --verbose 2>&1 | tee build.log

      # 9b. Build başarısız olsa bile log'u artifact olarak yükle
      - name: 📋 Build log artifact (hata ayıklama)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: |
            build.log
            pubspec.yaml
            android/settings.gradle.kts
            android/app/build.gradle.kts
            android/gradle/wrapper/gradle-wrapper.properties
          retention-days: 7

      # 9. APK'ları artifact olarak yükle (her zaman erişilebilir)
      - name: 📤 APK'ları yükle
        uses: actions/upload-artifact@v4
        with:
          name: vampir-koylu-apks
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      # 10. Tag varsa Release oluştur ve APK'ları ekle
      - name: 🎁 Release oluştur (tag varsa)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/*.apk
          generate_release_notes: true
          body: |
            ## 🦇 Vampir Köylü ${{ github.ref_name }}

            APK dosyalarını aşağıdan indirebilirsin:
            - `app-arm64-v8a-release.apk` → Modern telefonlar (önerilen)
            - `app-armeabi-v7a-release.apk` → Eski telefonlar
            - `app-x86_64-release.apk` → Emülatör

            Telefona yükleme: APK'yi indir, "Bilinmeyen kaynaklardan yükleme" izni ver, dosyayı aç.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
