name: 🦇 Build APK

# Bu workflow'u tetiklemenin yolları:
# 1. main/master branşına push at — otomatik build
# 2. GitHub'da Actions sekmesinden manuel çalıştır (workflow_dispatch)
# 3. Tag oluştur (v1.0.0 gibi) — release olarak APK eklenir

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1. Kodu çek
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # 2. Java 17 kur (Flutter için gerekli)
      - name: ☕ Java 17 kurulumu
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Flutter SDK kur (en son stable - withValues API'si için 3.27+ gerek)
      - name: 🦋 Flutter SDK kurulumu
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 4. Flutter durumunu kontrol et
      - name: 🩺 Flutter doctor
        run: flutter doctor -v

      # 5. Eksik platform dosyalarını tamamla
      # PubSPEC.YAML DAHIL tüm özel dosyaları yedekle → flutter create → geri yükle
      # flutter_launcher_icons gibi top-level key'lerin kaybolmasını önler
      - name: 🏗️ Eksik platform dosyalarını doldur
        run: |
          mkdir -p /tmp/backup/android/app/src/main/kotlin/com/vampirkoylu/app
          mkdir -p /tmp/backup/android/app/src/main/res/values
          mkdir -p /tmp/backup/android/app/src/main/res/values-night
          mkdir -p /tmp/backup/android/app/src/main/res/drawable

          # Özel pubspec.yaml — flutter_launcher_icons config bunda
          cp pubspec.yaml /tmp/backup/pubspec.yaml
          # Android özelleştirmeleri
          cp -r android/app/src/main/AndroidManifest.xml /tmp/backup/android/app/src/main/ 2>/dev/null || true
          cp android/app/build.gradle.kts /tmp/backup/android/app/ 2>/dev/null || true
          cp android/build.gradle.kts /tmp/backup/android/ 2>/dev/null || true
          cp android/settings.gradle.kts /tmp/backup/android/ 2>/dev/null || true
          cp android/gradle.properties /tmp/backup/android/ 2>/dev/null || true
          cp android/app/src/main/kotlin/com/vampirkoylu/app/MainActivity.kt /tmp/backup/android/app/src/main/kotlin/com/vampirkoylu/app/ 2>/dev/null || true
          cp android/app/src/main/res/values/styles.xml /tmp/backup/android/app/src/main/res/values/ 2>/dev/null || true
          cp android/app/src/main/res/values-night/styles.xml /tmp/backup/android/app/src/main/res/values-night/ 2>/dev/null || true
          cp android/app/src/main/res/drawable/launch_background.xml /tmp/backup/android/app/src/main/res/drawable/ 2>/dev/null || true

          # Flutter create — eksik wrapper jar, gradlew, default drawable vs. eklensin
          flutter create --platforms=android --project-name=vampir_koylu --org=com.vampirkoylu --overwrite . || true

          # Özelleştirmeleri geri yükle
          cp /tmp/backup/pubspec.yaml pubspec.yaml
          cp -r /tmp/backup/android/app/src/main/AndroidManifest.xml android/app/src/main/ 2>/dev/null || true
          cp /tmp/backup/android/app/build.gradle.kts android/app/ 2>/dev/null || true
          cp /tmp/backup/android/build.gradle.kts android/ 2>/dev/null || true
          cp /tmp/backup/android/settings.gradle.kts android/ 2>/dev/null || true
          cp /tmp/backup/android/gradle.properties android/ 2>/dev/null || true
          cp /tmp/backup/android/app/src/main/kotlin/com/vampirkoylu/app/MainActivity.kt android/app/src/main/kotlin/com/vampirkoylu/app/ 2>/dev/null || true
          cp /tmp/backup/android/app/src/main/res/values/styles.xml android/app/src/main/res/values/ 2>/dev/null || true
          cp /tmp/backup/android/app/src/main/res/values-night/styles.xml android/app/src/main/res/values-night/ 2>/dev/null || true
          cp /tmp/backup/android/app/src/main/res/drawable/launch_background.xml android/app/src/main/res/drawable/ 2>/dev/null || true

          # Eski MainActivity flutter create tarafından eklenmiş olabilir (yanlış path'te)
          rm -f android/app/src/main/kotlin/com/vampirkoylu/vampir_koylu/MainActivity.kt 2>/dev/null || true
          rmdir android/app/src/main/kotlin/com/vampirkoylu/vampir_koylu 2>/dev/null || true

          echo "==== pubspec.yaml ilk 80 satir ===="
          head -80 pubspec.yaml
          echo "==== flutter_launcher_icons konfig kontrolu ===="
          grep -A 10 "flutter_launcher_icons:" pubspec.yaml || echo "BULUNAMADI!"

      # 5b. flutter create varsayilan ikon dosyalarini silelim — bizimkilerle cakismasin
      - name: 🧹 Varsayilan ikonlari temizle
        run: |
          rm -rf android/app/src/main/res/mipmap-hdpi || true
          rm -rf android/app/src/main/res/mipmap-mdpi || true
          rm -rf android/app/src/main/res/mipmap-xhdpi || true
          rm -rf android/app/src/main/res/mipmap-xxhdpi || true
          rm -rf android/app/src/main/res/mipmap-xxxhdpi || true

      # 6. Bağımlılıkları indir
      - name: 📦 Bağımlılıklar
        run: flutter pub get

      # 7. App ikonlarını tüm Android boyutlarına üret
      # continue-on-error: ikon hatası APK build'i durdurmasın (default ikonla devam)
      - name: 🎨 Launcher ikonlarını üret
        continue-on-error: true
        run: |
          echo "==== assets/icon icerigi ===="
          ls -la assets/icon/ || echo "assets/icon klasoru yok!"
          echo "==== flutter_launcher_icons calistir ===="
          dart run flutter_launcher_icons

      # 8. Analiz (kod kalite kontrolü) — hatalar build'i durdurmasın
      - name: 🔍 Analiz
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      # 9. APK build (release, split-per-abi ile küçük APK'lar)
      - name: 🔨 APK build (release)
        run: flutter build apk --release --split-per-abi

      # 9. APK'ları artifact olarak yükle (her zaman erişilebilir)
      - name: 📤 APK'ları yükle
        uses: actions/upload-artifact@v4
        with:
          name: vampir-koylu-apks
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      # 10. Tag varsa Release oluştur ve APK'ları ekle
      - name: 🎁 Release oluştur (tag varsa)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/*.apk
          generate_release_notes: true
          body: |
            ## 🦇 Vampir Köylü ${{ github.ref_name }}

            APK dosyalarını aşağıdan indirebilirsin:
            - `app-arm64-v8a-release.apk` → Modern telefonlar (önerilen)
            - `app-armeabi-v7a-release.apk` → Eski telefonlar
            - `app-x86_64-release.apk` → Emülatör

            Telefona yükleme: APK'yi indir, "Bilinmeyen kaynaklardan yükleme" izni ver, dosyayı aç.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
