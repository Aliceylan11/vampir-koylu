name: vampir_koylu
description: "Vampir Köylü — Karanlık bir köyde gerçeği arayan sosyal çıkarım oyunu"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"  # withValues(), WidgetState API'si için

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # UI / Animation
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.2

  # Storage
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Audio / Haptics
  audioplayers: ^6.0.0
  vibration: ^2.0.0
  wakelock_plus: ^1.2.5

  # Utilities
  uuid: ^4.4.0
  intl: ^0.20.0
  collection: ^1.18.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/images/
    - assets/audio/
    - assets/animations/

  # Google Fonts üzerinden indirilecek, manuel font dosyası gerekmiyor.

# ============== APP IKONU ==============
# Build sırasında: dart run flutter_launcher_icons
# Tüm Android boyutları (mdpi/hdpi/xhdpi/xxhdpi/xxxhdpi) otomatik üretilir.
flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  # Adaptive icon (Android 8+) — modern telefonlarda yuvarlak/şekilli ikon
  adaptive_icon_background: "#0A0613"
  adaptive_icon_foreground: "assets/icon/icon_fg.png"
  remove_alpha_ios: true
